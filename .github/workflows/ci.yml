name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned (not @stable) so `cargo fmt --check` is reproducible — a floating
      # stable rustfmt drifted and produced spurious failures on unchanged code.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --check
      # NOTE: cargo check / clippy / test are intentionally omitted for now —
      # the sqlx-backed build needs a reproducible CI build env (a DB service
      # and/or a committed .sqlx offline cache). Tracked in beads as a follow-up.
      #
      # The TypeScript typecheck job was removed: this is a Rust-only repo
      # (no package.json / .ts files), so that job could never pass.

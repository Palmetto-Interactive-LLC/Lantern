name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2026.6.0)'
        required: true

permissions:
  contents: read

jobs:
  verify-tag:
    name: Verify signed tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release tag signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          TAG="$RELEASE_TAG"
          case "$TAG" in
            v*) ;;
            *)
              echo "::error::Release tag must start with v: ${TAG}"
              exit 1
              ;;
          esac

          REF_TYPE="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.type')"
          if [ "$REF_TYPE" != "tag" ]; then
            echo "::error::${TAG} is not a signed annotated tag. Create it with: git tag -s -m \"Lantern ${TAG}\" ${TAG}"
            exit 1
          fi

          TAG_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')"
          VERIFIED="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq '.verification.verified')"
          REASON="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq '.verification.reason')"
          TAGGER="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq '.tagger.email')"

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::${TAG} signature is not GitHub-verified: ${REASON}"
            exit 1
          fi

          echo "Verified signed release tag ${TAG} by ${TAGGER}"

  build:
    name: Build macOS binaries
    needs: verify-tag
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Build aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64-apple-darwin
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: scripts/package-release.sh "$RELEASE_TAG" aarch64-apple-darwin x86_64-apple-darwin

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: lantern-binaries
          path: dist/
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lantern-binaries
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            EXISTING_ASSETS="$(gh release view "${TAG}" --json assets --jq '.assets[].name')"
            upload=()
            for asset in dist/*.tar.gz dist/SHA256SUMS dist/install-lantern.sh; do
              name="$(basename "${asset}")"
              if ! grep -Fxq "${name}" <<<"${EXISTING_ASSETS}"; then
                upload+=("${asset}")
              fi
            done
            if [ "${#upload[@]}" -eq 0 ]; then
              echo "Release ${TAG} already has all expected assets — skipping upload"
              gh release view "${TAG}" --json tagName,assets \
                --jq '{tag: .tagName, assets: [.assets[].name]}'
            else
              echo "Release ${TAG} exists — uploading missing asset(s)"
              gh release upload "${TAG}" "${upload[@]}"
            fi
          else
            gh release create "${TAG}" \
              --title "Lantern ${TAG}" \
              --generate-notes \
              dist/*.tar.gz \
              dist/SHA256SUMS \
              dist/install-lantern.sh
          fi
